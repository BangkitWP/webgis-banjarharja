<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
<script type="module" src="leaflet.ajax.js"></script>

<style>
#maps{
    height:570px;
}
.legend{
    background:white;
    padding:10px;
    line-height:20px;
    border-radius:5px;
    box-shadow:0 0 5px rgba(0,0,0,0.3);
}
body{
    margin:0;
    font-family:Arial, sans-serif;
}

.header{
    background:#2E8B57;
    color:white;
    text-align:center;
    padding:10px;
    font-size:15px;
    font-weight:bold;
}

#maps{
    height:calc(100vh - 70px);
}
.legend {
    background:white;
    padding:6px;
}

.logo-box{
    background:white;
    padding:8px;
    border-radius:5px;
    box-shadow:0 0 5px rgba(0,0,0,0.3);
    text-align:center;
}

.logo-box img{
    margin:3px;
}
body{
    margin:0;
    font-family:Arial, sans-serif;
}

.header{
    background:#ffffff;
    color:rgb(15, 15, 15);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 20px;
}
.logo-kiri{
    text-align:left;
}

.logo-kanan{
    text-align:right;
}
.logo-kiri img,
.logo-kanan img{
    width:75px;
    height:auto;
}

.judul{
    text-align:center;
    flex:1;
}

.judul h1{
    margin:0;
    font-size:28px;
}

.judul p{
    margin:5px 0 0 0;
    font-size:16px;
}

.subheader{
    background:#b8babb;
    text-align:center;
    padding:8px;
    font-size:14px;
    font-weight:bold;
    border-bottom:1px solid #ccc;
}

#maps{
    height:calc(100vh - 130px);
}
</style>
<script src=""https://cdnjs.cloudflare.com/ajax/libs/leaflet-ajax/2.1.0/leaflet.ajax.min.js""></script>
</head>

<body>

<body>

<div class="header">

    <div class="logo-kiri">
        <img src="Logo_Prov.png" alt="Logo Jawa Barat">
    </div>

    <div class="judul">
        <h1>WEBGIS DESA BANJARHARJA</h1>
        <p>Kecamatan Kalipucang, Kabupaten Pangandaran, Provinsi Jawa Barat</p>
    </div>

    <div class="logo-kanan">
        <img src="Logo_Pa.jpg" alt="Logo Pangandaran">
    </div>

</div>

<div class="subheader">
    Data Spasial Desa | Batas Dusun | Penggunaan Lahan | UMKM | Fasilitas Umum | Budidaya | Peternakan
</div>

<div id="maps"></div>

</body>
<div id="maps"></div>


<script>

var mymap = L.map('maps').setView([-7.624315432248983, 108.731912232445], 15);

var batasDusun = L.layerGroup();
var jalanDesa = L.layerGroup();
var sungai = L.layerGroup();
var sungaiADM = L.layerGroup();
var pendidikan = L.layerGroup();
var ibadah = L.layerGroup();
var umkm = L.layerGroup();
var pemerintahan = L.layerGroup(); // Memperbaiki nama variabel agar konsisten lowercase
var penggunaanLahan = L.layerGroup();
var agrowisata = L.layerGroup();
var peternakan = L.layerGroup();

var OpenStreetMap = L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        maxZoom:19,
        attribution:'&copy; OpenStreetMap'
    }
);

var Esri_WorldImagery = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {
        maxZoom:22,
        attribution:'Tiles &copy; Esri'
    }
);

var Esri_WorldStreetMap = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
    {
        maxZoom:19,
        attribution:'Tiles &copy; Esri'
    }
);

OpenStreetMap.addTo(mymap);


function popUp(feature, layer) {
    var out = [];
    if (feature.properties) {
        for (var key in feature.properties) {
            out.push(key + ": " + " <b>" + feature.properties[key] + "</b>");
        }
        layer.bindPopup(out.join("<br>"));
    }
}

function getColor(dusun){
    switch(dusun){
        case "Bulakbanjar":
            return "#e41a1c";

        case "Sindangkasih":
            return "#377eb8";

        case "Sindangsari":
            return "#4daf4a";

        default:
            return "#999999";
    }
}
function getLanduseColor(jenis){

    if(!jenis) return "#CCCCCC";

    jenis = jenis.toString().trim().toLowerCase();

    switch(jenis){

        case "lahan kosong":
            return "#D3D3D3";

        case "lapangan":
            return "#7CFC00";

        case "pemakaman":
            return "#800080";

        case "perkebunan":
            return "#228B22";

        case "permukiman":
            return "#FFA500";

        case "pertambangan":
            return "#8B4513";

        case "sawah":
            return "blue";

        default:
            console.log("Kategori tidak dikenali:", jenis);
            return "#CCCCCC";
    }
}

fetch("Administrasi Desa.geojson")
.then(response => response.json())
.then(data => {

    var geojsonLayer = L.geoJSON(data,{
    onEachFeature: popUp,
    style: function(feature){
        return {
            color:"black",
            weight:0.5,
            fillColor:getColor(feature.properties.Dusun),
            fillOpacity:0.5
        };
    }
}).addTo(batasDusun);

batasDusun.addTo(mymap);

    fetch("Jalan_Desa.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data,{
        style:{
            color:"#8B4513",
            weight:3
        }
    }).addTo(jalanDesa);

});

fetch("Sungai_AR.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data,{
        style:{
            color:"blue",
            weight:2
        }
    }).addTo(sungai);

});

fetch("Pendidikan Desa.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data,{
        pointToLayer:function(feature,latlng){
            return L.circleMarker(latlng,{
                radius:6,
                color:"orange",
                fillColor:"orange",
                fillOpacity:0.8
            });
        },
        onEachFeature:popUp
    }).addTo(pendidikan);

});

fetch("Tempat Ibadah.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data,{
        pointToLayer:function(feature,latlng){
            return L.circleMarker(latlng,{
                radius:6,
                color:"green",
                fillColor:"green",
                fillOpacity:0.8
            });
        },
        onEachFeature:popUp
    }).addTo(ibadah);

});

fetch("Pemerintahan.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data,{
        pointToLayer:function(feature,latlng){
            return L.circleMarker(latlng,{
                radius:7,
                color:"yellow",
                fillColor:"yellow",
                fillOpacity:1
            });
        }
    }).addTo(pemerintahan);

});

fetch("Titik_UMKM.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data,{
        pointToLayer:function(feature,latlng){
            return L.circleMarker(latlng,{
                radius:6,
                color:"red",
                fillColor:"red",
                fillOpacity:0.8
            });
        },
        onEachFeature:popUp
    }).addTo(umkm);

});

fetch("Agrowisata.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data,{
        pointToLayer:function(feature,latlng){
            return L.circleMarker(latlng,{
                radius:6,
                color:"green",
                fillColor:"green",
                fillOpacity:0.8
            });
        },
        onEachFeature:popUp
    }).addTo(agrowisata);

});

fetch("Peternakan.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data,{
        pointToLayer:function(feature,latlng){
            return L.circleMarker(latlng,{
                radius:6,
                color:"orange",
                fillColor:"orange",
                fillOpacity:0.8
            });
        },
        onEachFeature:popUp
    }).addTo(peternakan);

});

fetch("Pengunaanlahan.geojson")
.then(response => response.json())
.then(data => {

    var geojsonLayer = L.geoJSON(data,{
    onEachFeature: popUp,
    style: function(feature){
        return {
            color:"black",
            weight:0.5,
            fillColor:getLanduseColor(feature.properties.REMARK),
            fillOpacity:0.5
        };
        }
    }).addTo(penggunaanLahan);

});
fetch("Sungai_ADM.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data,{
        style:{
            color:"#00BFFF",
            weight:2,
            dashArray:"5,5"
        },
        onEachFeature: popUp
    }).addTo(sungaiADM);

});

var legendaPL = L.control({position:'bottomleft'});

legendaPL.onAdd = function(){

    var div = L.DomUtil.create('div','legend');

    div.innerHTML =
        '<b>PenggunaanLahan</b><br>' +
        '<i style="background:#D3D3D3;width:15px;height:15px;display:inline-block"></i> Lahan Kosong<br>' +
        '<i style="background:#7CFC00;width:15px;height:15px;display:inline-block"></i> Lapangan<br>' +
        '<i style="background:#4B0082;width:15px;height:15px;display:inline-block"></i> Pemakaman<br>' +
        '<i style="background:#228B22;width:15px;height:15px;display:inline-block"></i> Perkebunan<br>' +
        '<i style="background:#FFA500;width:15px;height:15px;display:inline-block"></i> Permukiman<br>' +
        '<i style="background:#8B4513;width:15px;height:15px;display:inline-block"></i> Pertambangan<br>' +
        '<i style="background:#FFFF00;width:15px;height:15px;display:inline-block"></i> Sawah';

    return div;
};

legendaPL.addTo(mymap);


var overlayMaps = {
    "Jalan Desa": jalanDesa,
    "Sungai": sungai,
    "Cabang Sungai": sungaiADM,
    "Fasilitas Pendidikan": pendidikan,
    "Tempat Ibadah": ibadah,
    "UMKM": umkm,
    "Pemerintahan": pemerintahan,
    "Agrowisata": agrowisata,
    "Peternakan": peternakan,
    "Penggunaan Lahan": penggunaanLahan,
    "Batas Dusun": batasDusun,

};
var baseMaps = {
    "OpenStreetMap": OpenStreetMap,
    "Esri Imagery": Esri_WorldImagery,
    "Esri Street Map": Esri_WorldStreetMap
};

L.control.layers(baseMaps, overlayMaps).addTo(mymap);

    mymap.fitBounds(geojsonLayer.getBounds());

    var legend = L.control({position: 'bottomleft'});

legend.onAdd = function(map){
    

    var div = L.DomUtil.create('div', 'info legend');

    div.innerHTML += '<i style="background:#e41a1c;width:18px;height:18px;display:inline-block"></i> Bulakbanjar<br>';
    div.innerHTML += '<i style="background:#377eb8;width:18px;height:18px;display:inline-block"></i> Sindangkasih<br>';
    div.innerHTML += '<i style="background:#4daf4a;width:18px;height:18px;display:inline-block"></i> Sindangsari<br>';

    return div;
};
legend.addTo(mymap);});

var logoControl = L.control({position: 'bottomright'});

logoControl.onAdd = function(map){

    var div = L.DomUtil.create('div','logo-box');

    div.innerHTML = `
        <div class="logo-box">
            <img src="Logo_Pa.jpg" width="35">
            <img src="Logo_UGM.png" width="40">
            <br>
            <small>Dibuat oleh Tim KKN-PPM UGM 2026</small>
        </div>
    `;

    return div;
};
logoControl.addTo(mymap);


</script>

</body>
</html>
